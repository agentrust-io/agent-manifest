name: Publish to PyPI

on:
  push:
    tags: ["python-v*"]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install build twine
      - name: Build wheel and sdist
        working-directory: python
        run: python -m build
      - name: Verify dist
        working-directory: python
        run: twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: python/dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package and AGT for governance attestation
        working-directory: python
        run: pip install -e "." agent-governance-toolkit-core pyyaml

      - name: Generate evidence file
        run: python scripts/gen_agt_evidence.py

      - name: AGT governance verify (strict)
        run: agt verify --evidence agt-evidence.json

      - name: Save attestation JSON
        run: agt --json verify --evidence agt-evidence.json > agt-attestation.json

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*
            agt-evidence.json
            agt-attestation.json
          generate_release_notes: true
