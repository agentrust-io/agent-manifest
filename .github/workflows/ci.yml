name: CI

on:
  push:
    branches: [main]
    paths:
      - "python/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "python/**"

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: [ubuntu-latest]
        include:
          - python-version: "3.11"
            os: windows-latest
          - python-version: "3.11"
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev deps
        working-directory: python
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: python
        run: pytest -v --tb=short

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - name: Ruff check
        working-directory: python
        run: ruff check src/ tests/ --select E,F,W --ignore E501

  build-check:
    name: Build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install build twine
      - name: Build
        working-directory: python
        run: python -m build
      - name: Check distribution
        working-directory: python
        run: twine check dist/*
