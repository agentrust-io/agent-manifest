name: CI

on:
  push:
    branches: [main]
    paths:
      - "python/**"
      - "spec/**"
      - "examples/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "python/**"
      - "spec/**"
      - "examples/**"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: [ubuntu-latest]
        include:
          - python-version: "3.11"
            os: windows-latest
          - python-version: "3.11"
            os: macos-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev deps
        working-directory: python
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        working-directory: python
        shell: bash
        run: |
          pytest -v --tb=short \
            --cov=agent_manifest \
            --cov-report=term-missing \
            --cov-fail-under=80

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - name: Ruff check
        working-directory: python
        run: ruff check src/ tests/ --select E,F,W --ignore E501

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package and dev deps
        working-directory: python
        run: pip install -e ".[dev]"
      - name: mypy
        working-directory: python
        run: mypy src/agent_manifest

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package and dev deps
        working-directory: python
        run: pip install -e ".[dev]"
      - name: bandit
        working-directory: python
        run: bandit -r src/agent_manifest -c pyproject.toml
      - name: Upgrade pip before audit
        run: pip install --upgrade pip
      - name: pip-audit
        working-directory: python
        run: pip-audit

  governance:
    name: AGT governance verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and AGT
        working-directory: python
        run: pip install -e ".[dev]" agent-governance-toolkit-core

      - name: Install PyYAML (needed by gen script)
        run: pip install pyyaml

      - name: Generate evidence file
        run: python scripts/gen_agt_evidence.py

      - name: AGT governance verify (strict)
        run: agt verify --evidence agt-evidence.json

      - name: Save attestation JSON
        run: agt --json verify --evidence agt-evidence.json > agt-attestation.json

      - name: Upload governance artifacts
        uses: actions/upload-artifact@v7
        with:
          name: agt-governance-${{ github.sha }}
          path: |
            agt-evidence.json
            agt-attestation.json
          if-no-files-found: warn

  build-check:
    name: Build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install build twine
      - name: Build
        working-directory: python
        run: python -m build
      - name: Check distribution
        working-directory: python
        run: twine check dist/*
