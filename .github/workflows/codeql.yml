name: CodeQL

on:
  push:
    branches: [main]
    paths:
      - "python/**"
  pull_request:
    branches: [main]
    paths:
      - "python/**"
  schedule:
    - cron: "0 3 * * 1"  # Weekly on Monday at 03:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze Python
    runs-on: ubuntu-latest
    # Dependabot PRs run with read-only token; skip CodeQL to avoid permission errors.
    # The weekly scheduled run still covers the dependency surface.
    if: github.actor != 'dependabot[bot]'

    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-extended
          # Deterministic test-vector fixtures use a fixed, published, non-secret
          # seed (see python/tests/vectors/generate.py) and never persist private
          # key material. Exclude them so the fixed test seed does not trip the
          # clear-text-storage query. Production code stays fully scanned.
          config: |
            paths-ignore:
              - python/tests/vectors/**

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:python
          upload: if-supported
